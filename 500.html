<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;

  flex-direction: column;
  align-items: center;

  font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;

/* ── Back link ── */
.back-link {
  position: fixed;
  top: 20px;
  left: 20px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 18px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  color: #94a3b8;
  font-size: 0.85rem;
  font-weight: 600;
  text-decoration: none;
  z-index: 100;
  transition: all 0.2s ease;
}
.back-link:hover {
  background: rgba(255,255,255,0.2);
  color: #e2e8f0;
  transform: translateX(-3px);
}
html:not(.dark) .back-link {
  background: rgba(0,0,0,0.05);
  border-color: rgba(0,0,0,0.1);
  color: #6b7280;
}
html:not(.dark) .back-link:hover {
  background: rgba(0,0,0,0.1);
  color: #1f2937;
}

/* ── Theme toggle ── */
.theme-toggle-fab {
  position: fixed;
  top: 20px;
  right: 20px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.15);
  color: #e2e8f0;
  cursor: pointer;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
}
.theme-toggle-fab:hover {
  background: rgba(255,255,255,0.2);
  transform: scale(1.1);
}
html:not(.dark) .theme-toggle-fab {
  background: rgba(0,0,0,0.05);
  border-color: rgba(0,0,0,0.1);
  color: #4b5563;
}
html:not(.dark) .theme-toggle-fab:hover {
  background: rgba(0,0,0,0.1);
}

/* ── Duck card (Uiverse by ashif_6672) ── */
.card {
  --bg-color: #1e1e24;
  --bg-gradient: linear-gradient(135deg, #1e1e24 0%, #2a2a35 100%);
  --duck-body: #f4f4f5;
  --duck-wing: #e4e4e7;
  --duck-beak: #ff3b30;
  --duck-feet: #ff9f0a;
  --duck-eye: #18181b;

  --base-speed: 1s;
  --turbo-speed: 0.3s;

  position: relative;
  width: 100%;
  max-width: 600px;
  height: 500px;
  background: var(--bg-gradient);
  border-radius: 24px;
  box-shadow:
    0 20px 50px rgba(0, 0, 0, 0.5),
    inset 0 1px 0 rgba(255, 255, 255, 0.1);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.3s ease;
}
.card:hover {
  transform: translateY(-5px);
}
.card:hover {
  --base-speed: var(--turbo-speed);
}
.card:hover .error-code {
  color: rgba(255, 255, 255, 0.1);
}
.card .error-container {
  text-align: center;
  z-index: 10;
  margin-bottom: 2rem;
  pointer-events: none;
}
.card .error-code {
  font-size: 10rem;
  font-weight: 800;
  color: rgba(255, 255, 255, 0.05);
  line-height: 0.8;
  transition: color 0.3s ease;
  letter-spacing: -5px;
}
.card .error-msg {
  font-size: 1.5rem;
  font-weight: 600;
  color: #fff;
  margin-top: -20px;
  margin-bottom: 2rem;
  letter-spacing: -0.5px;
}
.card .home-btn {
  pointer-events: auto;
  display: inline-block;
  padding: 14px 32px;
  background-color: #fff;
  color: #000;
  font-weight: 700;
  text-decoration: none;
  border-radius: 12px;
  font-size: 0.9rem;
  transition: all 0.2s ease;
}
.card .home-btn:hover {
  background-color: var(--duck-beak);
  color: white;
  transform: scale(1.05);
}
.card .duck__wrapper {
  display: grid;
  place-content: center;
  z-index: 5;
  transform: scale(0.85);
  transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.card:hover .duck__wrapper {
  transform: scale(0.85) rotate(5deg) translateX(20px);
}
.card .duck {
  display: flex;
  flex-direction: column;
  position: relative;
}
.card .duck__inner {
  display: flex;
  flex-direction: column;
  position: relative;
  animation: bird-up-down calc(var(--base-speed) / 2) linear infinite;
}
.card .duck__head {
  align-self: flex-end;
  width: 6rem;
  height: 4rem;
  border-radius: 8rem 8rem 0 0;
  background-color: var(--duck-body);
  position: relative;
  z-index: 1;
}
.card .duck__head::after,
.card .duck__head::before {
  content: "";
  position: absolute;
  border-radius: 1rem;
  background-color: var(--duck-body);
  width: 0.4rem;
  height: 2rem;
  top: 0;
}
.card .duck__head::after {
  left: 44%;
  transform: translate(-50%, -50%) rotate(-30deg);
}
.card .duck__head::before {
  left: 45%;
  transform: translate(-50%, -50%) rotate(10deg);
}
.card .duck__white {
  position: absolute;
  top: 0.8rem;
  left: 0.8rem;
  width: 0.6rem;
  height: 1.3rem;
  transform: rotate(40deg);
  border-radius: 50%;
  border-left: 0.2rem solid rgba(255, 255, 255, 0.8);
}
.card .duck__eye {
  position: absolute;
  bottom: 0.2rem;
  right: 1rem;
  width: 0.8rem;
  height: 0.8rem;
  border-radius: 50%;
  background-color: var(--duck-eye);
  animation: eye-animation 2s infinite linear;
}
.card .duck__mouth {
  position: absolute;
  right: 0;
  top: 40%;
  width: 1rem;
  height: 1.2rem;
  transform: translate(90%, -50%);
  clip-path: polygon(0 0, 100% 40%, 100% 60%, 0% 100%);
  border-radius: 0 1rem 1rem 0;
  background-color: var(--duck-beak);
}
.card .duck__body {
  width: 9.5rem;
  height: 5rem;
  border-radius: 1rem 0 16rem 16rem;
  background-color: var(--duck-body);
  position: relative;
  overflow: hidden;
}
.card .duck__body::after {
  content: "";
  position: absolute;
  width: 105%;
  height: 200%;
  left: 50%;
  top: -95%;
  transform: translate(-50%, 0.02rem) rotate(-6deg);
  border-radius: 50%;
  border-bottom: 1rem solid #e4e4e7;
}
.card .duck__wing {
  position: absolute;
  left: 0.6rem;
  top: 55%;
  width: 4rem;
  height: 2.4rem;
  border-radius: 1rem 1rem 4rem 4rem;
  background-color: var(--duck-wing);
  transform: translate(0, -50%);
  transform-origin: right;
  animation: wing-animation var(--base-speed) linear infinite;
  z-index: 1;
}
.card .duck__foot {
  position: absolute;
  width: 0.6rem;
  height: 2rem;
  background-color: var(--duck-feet);
  z-index: -1;
}
.card .duck__foot::after {
  content: "";
  position: absolute;
  width: 2rem;
  height: 0.6rem;
  bottom: 0rem;
  left: -0.5rem;
  background-color: var(--duck-feet);
  border-radius: 1rem;
}
.card .duck__foot--1,
.card .duck__foot--2 {
  left: 40%;
  bottom: 0;
  transform: translate(-50%, 80%);
}
.card .duck__foot--1 {
  animation: foot-ans var(--base-speed) linear infinite;
}
.card .duck__foot--2 {
  animation: foot-ans var(--base-speed) calc(var(--base-speed) / 2) linear infinite;
}
.card .surface {
  position: absolute;
  bottom: -1.9rem;
  left: 55%;
  transform: translateX(-50%);
  background-color: rgba(0, 0, 0, 0.2);
  width: 8rem;
  height: 0.5rem;
  border-radius: 1rem;
  animation: surface-animation calc(var(--base-speed) / 2) linear infinite;
  filter: blur(2px);
}
.card .orb {
  position: absolute;
  border-radius: 50%;
  background-color: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(5px);
  animation: orb-animation 8s linear infinite;
}
.card:hover .orb {
  width: 150px !important;
  height: 2px !important;
  border-radius: 2px;
  background-color: rgba(255, 255, 255, 0.2);
  animation-duration: 0.5s;
}
.card .orb--1 { top: 10%; width: 40px; height: 40px; animation-delay: 0s; }
.card .orb--2 { top: 30%; width: 20px; height: 20px; animation-delay: -2s; }
.card .orb--3 { top: 60%; width: 60px; height: 60px; animation-delay: -4s; }
.card .orb--4 { top: 80%; width: 30px; height: 30px; animation-delay: -6s; }

@keyframes surface-animation {
  0%, 100% { transform: translateX(-50%) scaleX(0.9); }
  50% { transform: translateX(-50%) scaleX(1); }
}
@keyframes foot-ans {
  0% { transform: translate(-50%, 80%) rotate(0deg); }
  10% { transform: translate(-150%, 80%) rotate(10deg); }
  20% { transform: translate(-150%, 10%) rotate(10deg); }
  40% { transform: translate(400%, 10%) rotate(-20deg); }
  60% { transform: translate(600%, 60%) rotate(-20deg); }
  70% { transform: translate(500%, 60%) rotate(0deg); }
}
@keyframes bird-up-down {
  0%, 100% { transform: translateY(0.4rem); }
  50% { transform: translateY(0rem); }
}
@keyframes wing-animation {
  0%, 100% { transform: translate(0, -50%) rotate(16deg); }
  50% { transform: translate(0, -50%) rotate(-2deg); }
}
@keyframes eye-animation {
  0%, 20% { transform: scaleY(1); }
  10% { transform: scaleY(0); }
}
@keyframes orb-animation {
  0% { transform: translateX(650px); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateX(-200px); opacity: 0; }
}
</style>
<script>try{if(localStorage.getItem('app-theme')==='dark')document.documentElement.classList.add('dark')}catch(e){}</script>

<body>

<a href="index.html" class="back-link">
  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 12H5m7-7l-7 7 7 7"/></svg>
  Back to Dashboard
</a>

<button class="theme-toggle-fab" id="themeToggleFab" onclick="toggleTheme()" aria-label="Toggle dark mode">
  <svg class="w-5 h-5 moon-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
  <svg class="w-5 h-5 sun-icon hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
</button>

<div class="card" onclick="this.querySelector('.home-btn').click()">
  <div class="error-container">
    <div class="error-code">500</div>
    <div class="error-msg">Something went wrong on our end</div>
    <a href="index.html" class="home-btn">Take me home</a>
  </div>

  <div class="duck__wrapper">
    <div class="duck">
      <div class="duck__inner">
        <div class="duck__head">
          <div class="duck__white"></div>
          <div class="duck__eye"></div>
          <div class="duck__mouth"></div>
        </div>
        <div class="duck__body">
          <div class="duck__wing"></div>
        </div>
      </div>
      <div class="duck__foot duck__foot--1"></div>
      <div class="duck__foot duck__foot--2"></div>
    </div>
  </div>

  <div class="surface"></div>
  <div class="orb orb--1"></div>
  <div class="orb orb--2"></div>
  <div class="orb orb--3"></div>
  <div class="orb orb--4"></div>
</div>

<script>
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.classList.toggle('dark');
  localStorage.setItem('app-theme', isDark ? 'dark' : 'light');
  updateIcons();
}
function updateIcons() {
  const isDark = document.documentElement.classList.contains('dark');
  document.querySelectorAll('.moon-icon').forEach(el => el.classList.toggle('hidden', isDark));
  document.querySelectorAll('.sun-icon').forEach(el => el.classList.toggle('hidden', !isDark));
}
(function() {
  const isDark = document.documentElement.classList.contains('dark');
  document.querySelectorAll('.moon-icon').forEach(el => el.classList.toggle('hidden', isDark));
  document.querySelectorAll('.sun-icon').forEach(el => el.classList.toggle('hidden', !isDark));
})();
</script>

</body>
